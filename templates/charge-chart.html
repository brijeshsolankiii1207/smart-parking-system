{% load static %}  <!-- Only for Django, remove if plain HTML -->

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ParkEasy | Parking Charges</title>

  <!-- Bootstrap CSS -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />

  <!-- Font Awesome -->
  <link
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    rel="stylesheet"
  />

  <style>
    .table th,
    .table td {
      border: 1px solid #6c757d !important;
    }
    tbody tr:hover {
      background-color: #f1f5f9 !important;
    }

    .logo-img {
      height: 50px;
      width: auto;
      margin-right: 12px;
      border-radius: 21px;
      object-fit: contain;
      box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
      background: #fff;
      padding: 2px;
    }
  </style>
</head>
<body class="bg-light">
  <div class="container my-4">
    <div class="card shadow-lg border-0 rounded-4">
      <div
        class="card-header bg-primary text-white text-center rounded-top-4 d-flex justify-content-center align-items-center"
      >
        <img
          src="{% static 'images/Park_Easy_logo.jpg' %}"
          alt="ParkEasy Logo"
          class="logo-img"
        />
        <h4 class="mb-0">ParkEasy</h4>
      </div>

      <!-- Back Button OUTSIDE table, inside card -->
      <div class="p-3">
        <a href="/" class="btn btn-outline-primary">
          <i class="fas fa-arrow-left"></i> Back
        </a>
      </div>

      <div class="card-body p-0">
        <div class="table-responsive">
          <table
            class="table table-bordered table-hover table-striped text-center mb-0"
          >
            <thead class="table-dark">
              <tr>
                <th>Floor</th>
                <th>Vehicle Type</th>
                <th>Min 2 Hrs (₹)</th>
                <th>24 Hrs Max (₹)</th>
              </tr>
            </thead>
            <tbody>
              <!-- Basement: Only 2 Wheelers -->
              <tr>
                <td>Basement</td>
                <td>
                  <i class="fas fa-motorcycle text-secondary"></i> 2 Wheeler
                  (Bike/Scooter)
                </td>
                <td>25</td>
                <td>180</td>
              </tr>

              <!-- Ground Floor: Only 4 Seater Car -->
              <tr>
                <td>Ground</td>
                <td><i class="fas fa-car-side text-success"></i> 4 Seater Car / Mini Car</td>
                <td>60</td>
                <td>600</td>
              </tr>

              <!-- First Floor: Only 4 Seater Car -->
              <tr>
                <td>First Floor</td>
                <td><i class="fas fa-car-side text-success"></i> 4 Seater Car / Mini Car</td>
                <td>70</td>
                <td>650</td>
              </tr>

              <!-- Second Floor: Only 6 Seater / SUV / XUV -->
              <tr>
                <td>Second Floor</td>
                <td><i class="fas fa-truck-monster text-danger"></i> 6 Seater / SUV / XUV</td>
                <td>110</td>
                <td>950</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
