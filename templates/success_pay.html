<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Payment Success</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f5f9fc;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .success-container {
            background: #ffffff;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.08);
            text-align: center;
            max-width: 460px;
            width: 100%;
        }

        .success-icon {
            width: 80px;
            height: 80px;
            margin: 0 auto 20px;
        }

        .success-container h1 {
            color: #2c3e50;
            font-size: 2rem;
            margin-bottom: 10px;
        }

        .success-container p {
            color: #4a4a4a;
            font-size: 1rem;
            margin: 8px 0;
        }

        .success-container strong {
            font-weight: 600;
            color: #2c3e50;
        }

        .cta {
            margin-top: 30px;
        }

        .cta a {
            display: inline-block;
            background-color: #28a745;
            color: #ffffff;
            text-decoration: none;
            padding: 12px 26px;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 600;
            transition: background-color 0.3s ease;
        }

        .cta a:hover {
            background-color: #218838;
        }
    </style>
</head>
<body>
    <div class="success-container">
        <!-- SVG Success Icon -->
        <div class="success-icon">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 52 52" fill="none">
                <circle cx="26" cy="26" r="25" fill="#28a745" />
                <path d="M16 27L23 34L38 19" stroke="white" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </div>

        <h1>Payment Successful</h1>
        <p>Thank you for your payment, <strong>{{ booking.owner_name }}</strong>!</p>
        <p><strong>Vehicle No:</strong> {{ booking.vehicle_number }}</p>
        <p><strong>Slot:</strong> {{ booking.slot.slot_number }} ({{ booking.floor.name }})</p>
        <p><strong>Payment ID:</strong> {{ payment_id }}</p>

        <div class="cta">
            <a href="/">Return to Homepage</a>
        </div>
    </div>
</body>
</html>
