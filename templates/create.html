{% extends "base.html" %}
{% load static %}

{% block content %}
<div class="container mt-5">

  <!-- Back Button -->
  <div class="mb-3">
    <a href="/" class="btn btn-outline-primary">
      <i class="fas fa-arrow-left"></i> Back to Home
    </a>
  </div>

  <h2 class="text-center fw-bold mb-4 text-primary">📅 Book Parking Slot</h2>

  {% if selected_slot and selected_category and selected_floor %}
  <form method="POST" class="mx-auto"
        style="max-width: 700px; background-color: white; padding: 30px; border-radius: 10px; box-shadow: 0 6px 16px rgba(0, 0, 0, 0.1);">
    {% csrf_token %}

    <!-- Owner Details -->
    <div class="mb-3">
      <label for="owner_name" class="form-label">Owner Name</label>
      <input type="text" class="form-control" name="owner_name" required>
    </div>

    <div class="mb-3">
      <label for="vehicle_number" class="form-label">Vehicle Number</label>
      <input type="text" class="form-control" name="vehicle_number" required>
    </div>

    <div class="mb-3">
      <label for="mobile" class="form-label">Mobile</label>
      <div class="input-group">
        <span class="input-group-text">+91</span>
        <input type="text"
               class="form-control"
               name="mobile"
               pattern="\d{10}"
               maxlength="10"
               required
               title="Enter a valid 10-digit mobile number">
      </div>
    </div>

    <div class="mb-3">
      <label for="email" class="form-label">Email</label>
      <input type="email"
             class="form-control"
             name="email"
             required
             title="Enter a valid email address">
    </div>

    <!-- Hidden Fields for Category and Floor -->
    <input type="hidden" name="category" value="{{ selected_category.id }}">
    <input type="hidden" name="floor" value="{{ selected_floor.id }}">

    <div class="mb-3">
      <label class="form-label">Vehicle Category</label>
      <input type="text" class="form-control" value="{{ selected_category.name }}" disabled>
    </div>

    <div class="mb-3">
      <label class="form-label">Floor</label>
      <input type="text" class="form-control" value="{{ selected_floor.name }}" disabled>
    </div>

    <div class="mb-3">
      <label for="slot" class="form-label">Parking Slot</label>
      <select class="form-select" name="slot" required>
        <option value="{{ selected_slot.id }}" selected>{{ selected_slot.slot_number }}</option>
      </select>
    </div>

    <!-- Time Fields -->
    <div class="mb-3">
      <label for="start_time" class="form-label">Start Time</label>
      <input type="datetime-local"
             class="form-control"
             name="start_time"
             id="start_time"
             required>
    </div>

    <div class="mb-3">
      <label for="end_time" class="form-label">End Time</label>
      <input type="datetime-local"
             class="form-control"
             name="end_time"
             id="end_time"
             required>
    </div>

    <!-- Submit Button -->
    <button type="submit" class="btn btn-primary w-100 mt-3">
      <i class="fas fa-book"></i> Book Slot
    </button>
  </form>

  {% else %}
    <p class="text-center text-danger fw-bold">❌ No slot selected. Please go back and choose a slot from the parking page.</p>
  {% endif %}
</div>

<!-- JavaScript to prevent past datetime selection -->
<script>
  document.addEventListener("DOMContentLoaded", function () {
    const now = new Date();
    const pad = (n) => n.toString().padStart(2, '0');
    const datetimeLocal = `${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())}T${pad(now.getHours())}:${pad(now.getMinutes())}`;

    const startInput = document.getElementById("start_time");
    const endInput = document.getElementById("end_time");

    startInput.min = datetimeLocal;
    endInput.min = datetimeLocal;

    startInput.addEventListener('change', function () {
      endInput.min = this.value; // prevent end_time before start_time
    });
  });
</script>
{% endblock %}
